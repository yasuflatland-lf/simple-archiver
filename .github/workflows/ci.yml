name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: core (rust, pure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Belt and suspenders: mise.toml requests rustfmt/clippy/llvm-tools-preview
      # components, but ensure they exist on the active toolchain even if a cached
      # install lacks them. llvm-tools-preview is required by cargo-llvm-cov.
      - run: rustup component add rustfmt clippy llvm-tools-preview
      - run: cargo fmt --check
      - run: cargo clippy -p simple-archiver-core --all-targets -- -D warnings
      - run: cargo llvm-cov nextest -p simple-archiver-core --profile ci --lcov --output-path lcov.info --ignore-filename-regex 'build\.rs'
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  loom:
    name: loom (concurrency model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Belt and suspenders: ensure clippy is available even if a cached install lacks it.
      - run: rustup component add clippy
      # Keep the loom-gated build warning-clean (normal clippy never sees #[cfg(loom)] code).
      - run: RUSTFLAGS="--cfg loom" cargo clippy -p simple-archiver-core --features loom -- -D warnings
      # Run the loom nucleus: verifies single-writer aggregation (no message lost, correct
      # summary partition) under every loom interleaving. loom 0.7 models message count, not
      # sender-drop/channel closure, so the production worker→channel-close→drain ordering is
      # covered by the regular tokio tests, not loom. Does NOT verify the tokio runtime or
      # CancellationToken propagation (those are covered by the regular tokio cancel-path tests).
      - run: RUSTFLAGS="--cfg loom" cargo nextest run -p simple-archiver-core --features loom

  hygiene:
    name: hygiene (deps + orphan files)
    runs-on: ubuntu-latest
    # Load mise.ci-hygiene.toml so mise-action installs cargo-modules here only — it compiles
    # rust-analyzer from source (~16 min on Windows), and this is the sole job that runs it.
    env:
      MISE_ENV: ci-hygiene
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      # Unused Cargo.toml dependencies across the whole workspace (no compilation needed).
      # Intentional declarations (transitive version pins, PR5 pre-declarations) are
      # allow-listed via `[package.metadata.cargo-machete]` in each crate's Cargo.toml.
      - run: cargo machete
      # Orphan source files: `.rs` files not wired into the module tree (`--deny` fails on any).
      # Scoped to the pure core crate; src-tauri would need the GTK/webkit build env on Linux.
      # (Module-cycle detection via `cargo modules dependencies --acyclic` is intentionally not
      # run: it flags every type<->method pair as a cycle and cannot be filtered. See PR notes.)
      - run: cargo modules orphans -p simple-archiver-core --lib --deny

  frontend:
    name: frontend (oxlint + oxfmt + vitest + build + knip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - run: pnpm install --frozen-lockfile
      # Frontend format check (config in .oxfmtrc.json); fails if any file is unformatted.
      - run: pnpm fmt:check
      # Frontend lint gate (config in .oxlintrc.json); fails on warnings or errors.
      - run: pnpm lint:ci
      # Frontend dependency hygiene: unused files / deps / exports (config in knip.json).
      - run: pnpm knip
      - run: pnpm run test:coverage
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
      - run: pnpm build

  app:
    name: app (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Belt and suspenders: mise.toml requests clippy components, but
      # ensure they exist on the active toolchain even if a cached install lacks them.
      - run: rustup component add clippy
      - run: cargo nextest run -p simple-archiver-core --profile ci
      # PR6: the presentation crate's tests (Tauri command surface, progress
      # event sink, run_job integration) only build on runners with the Tauri
      # toolchain, which the app job has. Run them here so they are covered in CI.
      - if: matrix.os == 'macos-latest'
        run: cargo clippy -p simple-archiver --all-targets -- -D warnings
      - run: cargo nextest run -p simple-archiver --profile ci
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm tauri build --no-bundle
