[package]
name = "simple-archiver"
version = "0.5.0"
description = "Simple Archiver"
authors = ["Yasuyuki Takeo"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "simple_archiver_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
simple-archiver-core = { path = "../crates/core" }
tauri-plugin-dialog = "2"
# Powers the Inline Ledger's per-row "Copy path" action (clipboard write-text).
tauri-plugin-clipboard-manager = "2"
# Generates the TypeScript wire contract from the DTOs via `#[derive(TS)]`.
ts-rs = "12"
# Promoted from dev-dependencies: Wave 3's async `run_job` command needs the
# Tokio runtime in the library itself, not only in tests.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
# Wave 2 needs `CancellationToken`; declared now so later waves do not edit Cargo.toml.
tokio-util = "0.7"
# Pin bitflags < 2.9: bitflags 2.9+ introduced a recursive `__bitflags_flag_name!`
# macro that munches doc-comment attributes one-at-a-time. dispatch2 0.3.1
# (transitive via tao/tauri-runtime-wry) generates a `bitflags!` block with many
# heavily-documented flags, blowing past the default `recursion_limit = 128`
# ("recursion limit reached while expanding `$crate::__bitflags_flag_name!`").
# Upstream dispatch2 does not set `#![recursion_limit]`, so we constrain the
# transitive bitflags version here. Revisit when dispatch2 sets the limit or
# bitflags fixes the recursive expansion.
bitflags = "=2.13.0"

[package.metadata.cargo-machete]
# These are reported as unused because they are never referenced directly in source:
# - bitflags: declared only to pin the *transitive* bitflags version (see the comment on the
#   dependency above). Removing it would un-pin the transitive bitflags and reintroduce the
#   dispatch2 recursion_limit build failure, so it must stay and must be ignored here.
# - serde/serde_json: part of the Tauri scaffold for command (de)serialization. The current
#   commands use only primitive types, so there is no direct reference yet; they are kept for
#   forthcoming custom command payloads. Remove from Cargo.toml and this list together if dropped.
# tokio-util is now used directly (CancellationToken in RunState).
ignored = ["bitflags", "serde", "serde_json"]

[dev-dependencies]
zip = "=8.6.0"
tempfile = "=3.27.0"

